<html lang="en">
<head>

<title>Complex Case Knowledge Base — SilverStay</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0D1F35;
    --navy-mid: #1a3250;
    --navy-light: #2a4a6e;
    --slate: #EEF1F5;
    --accent: #3B82F6;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #dde3ed;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* NO overflow hidden, NO fixed heights, NO scrollbars */
  html, body {
    width: 100%;
    overflow: visible;
    font-family: 'DM Sans', sans-serif;
    background: var(--slate);
    color: var(--text);
  }

  header {
    background: var(--navy);
    width: 100%;
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px;
    box-shadow: 0 2px 12px rgba(13,31,53,0.3);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 30px; height: 30px; background: var(--accent); border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif; color: white; font-size: 15px; font-style: italic;
  }
  .logo-text { color: white; font-size: 14px; font-weight: 600; }
  .logo-sub { color: rgba(255,255,255,0.4); font-size: 11px; }
  .sync-badge {
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.55); font-size: 11px; padding: 4px 11px;
    border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .sync-badge.syncing { color: #60a5fa; border-color: rgba(96,165,250,0.4); }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
  .dot.spin { background: #60a5fa; animation: blink 0.7s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

  .hero {
    background: var(--navy);
    width: 100%;
    padding: 2.5rem 2rem 3rem;
    text-align: center; position: relative; overflow: hidden;
  }
  .hero::before {
    content:''; position:absolute; top:-60px; left:50%; transform:translateX(-50%);
    width:700px; height:300px;
    background:radial-gradient(ellipse,rgba(59,130,246,0.15) 0%,transparent 70%);
    pointer-events:none;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    color: white; line-height: 1.2; margin-bottom: 8px; position: relative;
  }
  .hero h1 em { color: var(--accent); font-style: italic; }
  .hero p { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 1.5rem; }

  .search-container { width: 100%; max-width: 660px; margin: 0 auto; }
  .search-wrapper {
    display: flex; background: white; border-radius: 12px;
    padding: 5px 5px 5px 16px; align-items: center; gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    border: 2px solid transparent; transition: border-color 0.2s;
  }
  .search-wrapper:focus-within { border-color: var(--accent); }
  #searchInput {
    flex: 1; border: none; outline: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--text); background: transparent; min-width: 0;
  }
  #searchInput::placeholder { color: #94a3b8; }
  #searchBtn {
    background: var(--navy); color: white; border: none; border-radius: 8px;
    padding: 9px 18px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  #searchBtn:disabled { opacity: 0.6; cursor: not-allowed; }

  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
  .filter-pill {
    background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 20px;
    padding: 4px 12px; font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .filter-pill:hover, .filter-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Main — no height constraint, just natural flow */
  main { width: 100%; padding: 1.5rem 2rem 3rem; }

  #statusBar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  #resultCount { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  #lastSyncLabel { font-size: 11px; color: #94a3b8; }

  #aiAnswer {
    display: none; background: white; border-radius: 14px;
    border: 2px solid var(--accent); padding: 1.25rem; margin-bottom: 1.25rem;
    box-shadow: 0 4px 20px rgba(59,130,246,0.1);
  }
  .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ai-chip {
    background: var(--accent); color: white; font-size: 10px; font-weight: 700;
    padding: 2px 9px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .ai-title { font-size: 12px; color: var(--text-muted); }
  #aiAnswerText { font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }

  .loading-dots { display: inline-flex; gap: 3px; align-items: center; }
  .loading-dots span { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite; }
  .loading-dots span:nth-child(2){animation-delay:.2s} .loading-dots span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-4px);opacity:1} }

  .quick-topics { margin-bottom: 1.25rem; }
  .quick-topics h3 { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .topic-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .topic-chip {
    background: white; border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 12px; font-size: 12px; color: var(--text);
    cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .topic-chip:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }

  #caseFeed { display: flex; flex-direction: column; gap: 10px; }

  .case-card {
    background: white; border-radius: 12px; border: 1px solid var(--border);
    overflow: hidden; transition: box-shadow 0.2s; cursor: pointer; width: 100%;
  }
  .case-card:hover { box-shadow: 0 4px 20px rgba(13,31,53,0.09); }
  .case-card.expanded .card-body { display: block; }
  .case-card .card-body { display: none; }
  .card-header { padding: 0.9rem 1.1rem; display: flex; align-items: flex-start; gap: 11px; }
  .card-icon {
    width: 32px; height: 32px; border-radius: 9px; background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 1px;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-question { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 7px; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .tag-snf { background: #dbeafe; color: #1e40af; }
  .tag-alf { background: #dcfce7; color: #166534; }
  .tag-ltc { background: #fef3c7; color: #92400e; }
  .tag-housing { background: #f3e8ff; color: #6b21a8; }
  .tag-transport { background: #ffe4e6; color: #9f1239; }
  .tag-financial { background: #e0f2fe; color: #075985; }
  .tag-behavioral { background: #fce7f3; color: #9d174d; }
  .tag-insurance { background: #ecfdf5; color: #065f46; }
  .tag-trach { background: #fff7ed; color: #9a3412; }
  .tag-bariatric { background: #fef9c3; color: #713f12; }
  .tag-dme { background: #f0f9ff; color: #0c4a6e; }
  .tag-uninsured { background: #fdf4ff; color: #6b21a8; }
  .card-asker { font-size: 11px; color: #94a3b8; margin-left: 2px; }
  .card-date { font-size: 10px; color: #94a3b8; margin-left: auto; white-space: nowrap; padding-left: 8px; flex-shrink: 0; }
  .chevron { font-size: 11px; color: #94a3b8; transition: transform 0.2s; flex-shrink: 0; margin-top: 3px; }
  .case-card.expanded .chevron { transform: rotate(180deg); }
  .card-body { border-top: 1px solid var(--border); padding: 0.9rem 1.1rem 1.1rem; background: #fafbfd; }
  .answer-block { display: flex; gap: 9px; margin-bottom: 10px; }
  .answer-block:last-child { margin-bottom: 0; }
  .answer-avatar {
    width: 24px; height: 24px; border-radius: 50%; background: var(--navy-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; margin-top: 1px;
  }
  .answer-author { font-size: 11px; font-weight: 600; color: var(--navy); margin-bottom: 2px; }
  .answer-text { font-size: 13px; color: var(--text); line-height: 1.6; }
  .no-ans { font-size: 13px; color: #94a3b8; font-style: italic; }

  #loadingSkel { display: flex; flex-direction: column; gap: 10px; }
  .skel-card {
    background: white; border-radius: 12px; border: 1px solid var(--border);
    padding: 0.9rem 1.1rem; display: flex; gap: 11px; animation: shimmer 1.4s infinite;
  }
  .s-ico { width: 32px; height: 32px; border-radius: 9px; background: #e2e8f0; flex-shrink: 0; }
  .s-lines { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .s-line { height: 11px; border-radius: 5px; background: #e2e8f0; }
  .s-l{width:82%} .s-m{width:54%} .s-s{width:30%}
  @keyframes shimmer { 0%,100%{opacity:1}50%{opacity:0.5} }
  .empty-state { text-align: center; padding: 2.5rem; color: var(--text-muted); font-size: 13px; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

  {id:1,question:"Has anyone had luck with SNF admission to Lorien? Barriers are trach needs and CRE/CRO isolation.",asker:"Ashley",date:"Nov 5, 2025",tags:["snf","trach"],icon:"🩺",answers:[{author:"Tina",text:"Lorien Bel Air, Columbia and Mt Airy accept trachs. Isolation is the bigger issue — they'll likely need a private room. Is it a new trach (less than 30 days)?"}]},
  {id:2,question:"Patient with $800/month income, state guardianship requires licensed ALF (not supportive care home). Any suggestions?",asker:"Vijay",date:"Nov 6, 2025",tags:["alf","financial"],icon:"💰",answers:[{author:"Tameka",text:"Have the hospital do a 3-month contract to ALF until the patient can apply for the waiver to help offset the cost."}]},
  {id:3,question:"Any suggestions for a SNF willing to take a young bariatric patient (under 500 lbs) with recent criminal record, dropped from correctional facility? Total care.",asker:"Erin",date:"Nov 5, 2025",tags:["snf","bariatric"],icon:"⚖️",answers:[]},
  {id:4,question:"Gold standard for submitting a LOC for patients on the border of LTC appropriate or not? Barriers for citizen who hasn't applied for Medicare/Medicaid going direct from hospital to LTC?",asker:"Vijay",date:"Nov 5, 2025",tags:["ltc","financial","insurance"],icon:"📋",answers:[{author:"Tina",text:"Submit LOC to include ALL NEEDS — OT, PT, SLP, wound care, ADLs. Ask OT for specific ADL and cognitive eval. Include summary in comments explaining why less restrictive won't work.\n2. Open enrollment for Medicare — MA office at the hospital should screen to see if they qualify for MA."}]},
  {id:5,question:"Complex MedStar case — clinical team open to outside Neuropsych expert for TBI patient in restraints 20+ days. Any connections?",asker:"Vijay",date:"Jan 15, 2026",tags:["behavioral"],icon:"🧠",answers:[{author:"Erin",text:"Dr. Swanton at LifeBridge (eswanton@lifebridgehealth.org) has TBI experience — Sydney says he's responsive and encouraged outreach."},{author:"Ashley",text:"TBI waiver folks at UMROI might point you in the right direction."}]},
  {id:6,question:"ALFs that can consider $2,000/month or less for patients with minimal care needs?",asker:"Nicole",date:"Jan 12, 2026",tags:["alf","financial"],icon:"💰",answers:[{author:"Nicole",text:"List posted on channel canvas. Please add any ALFs from your experience that aren't on it already."}]},
  {id:7,question:"58-year-old woman with paranoid schizophrenia — $1,400/month, no payer, elopement risk, refuses meds/vitals, needs secure unit. Guardianship pending. Where can she discharge?",asker:"Erin",date:"Jan 7, 2026",tags:["alf","behavioral","financial"],icon:"🧠",answers:[{author:"Team",text:"We can likely find a secure ALF but it will cost more than $1,400/month. Apply for waiver (takes time). For unclaimed assets: have sister change mailing address to her home, search unclaimed money online. Once guardianship is granted she can request tax returns."}]},

  {id:10,question:"35-year-old female, homeless, extensive psych issues, $380/month income, refused shelter. Any supportive housing options?",asker:"Tameka",date:"Mar 12, 2026",tags:["housing","behavioral","financial"],icon:"🏠",answers:[{author:"Tina",text:"Healthy Mind Maryland Transitional Housing — 443-241-7940. Also Project Plase (410-837-1400), though the liaison has been hard to reach."}]},
  {id:11,question:"LTC admissions questions for dementia patients: Is POA or legal guardian required for financial screen? Can non-POA family sign? Pathways when patient has no POA and no legal guardian?",asker:"Cristine",date:"Dec 5, 2025",tags:["ltc","financial"],icon:"⚖️",answers:[]},
  {id:12,question:"Need LTC facility accepting patient with poly substance abuse history, stable on Methadone, history of suicide attempts. Autumn Lake is regional denial.",asker:"Erin",date:"Dec 18, 2025",tags:["ltc","behavioral"],icon:"💊",answers:[]},
  {id:13,question:"Complex contract case: patient not a citizen, uninsured. UMROI paying $3k/month at ALF. Original plan for family to take to Georgia — blocked (brother has cancer). What else can we do?",asker:"Nicole",date:"Dec 19, 2025",tags:["alf","financial","uninsured"],icon:"🌐",answers:[{author:"Nicole/Vijay",text:"Schedule meeting with Jenna at UMROI to discuss long-term contract — significant cost savings from LTC to ALF already. Consider onsite visit with patient + interpreter and get brother on phone."}]},

  {id:16,question:"SNFs that have accepted oncology patients receiving active radiation or chemo — any tips?",asker:"Vijay",date:"Nov 13, 2025",tags:["snf","insurance"],icon:"🎗️",answers:[{author:"Traci Wheeler",text:"SNFs consider on a case-by-case basis. Better success when treatment is through a hospital system vs. standalone clinic (billing-related per liaisons). Transportation to/from treatment is a key factor."}]},

  {id:21,question:"Any contacts for FutureCare Pineview? Need admissions to update on a case status.",asker:"Vijay",date:"Mar 11, 2026",tags:["snf"],icon:"📞",answers:[{author:"Tina",text:"I can check with the FutureCare liaison at NWH tomorrow for a contact."}]},

  {id:24,question:"Any recommendations for skilled home health that takes private pay?",asker:"Erin",date:"Nov 13, 2025",tags:["financial"],icon:"🏡",answers:[]},

];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(cases){
  const feed=document.getElementById('caseFeed');
  const cnt=document.getElementById('resultCount');
  if(!cases.length){cnt.textContent='';feed.innerHTML='<div class="empty-state">No matching cases — try different keywords or clear the filter.</div>';return;}
  cnt.textContent=cases.length+' case'+(cases.length!==1?'s':'');
  feed.innerHTML=cases.map((c,i)=>{
    const id=c.id??i;
    const tags=(c.tags||[]).map(t=>`<span class="tag tag-${t}">${t.toUpperCase()}</span>`).join('');
    const body=(!c.answers||!c.answers.length)
      ?`<p class="no-ans">No recorded answers yet — check Slack for the latest thread.</p>`
      :c.answers.map(a=>`<div class="answer-block"><div class="answer-avatar">${esc(a.author||'?').charAt(0)}</div><div><div class="answer-author">${esc(a.author||'')}</div><div class="answer-text">${esc(a.text||'').replace(/\n/g,'<br>')}</div></div></div>`).join('');
    return `<div class="case-card" id="card-${id}" onclick="tog('card-${id}')">
      <div class="card-header">
        <div class="card-icon">${c.icon||'📋'}</div>
        <div class="card-meta">
          <div class="card-question">${esc(c.question)}</div>
          <div class="card-tags">${tags}<span class="card-asker">— ${esc(c.asker||'')}</span></div>
        </div>
        <div class="card-date">${esc(c.date||'')}</div>
        <div class="chevron">▼</div>
      </div>
      <div class="card-body">${body}</div>
    </div>`;
  }).join('');
  setTimeout(reportHeight,100);
}

function tog(id){
  document.getElementById(id)?.classList.toggle('expanded');
  setTimeout(reportHeight,100);
}
function applyFilter(){
  shown=activeFilter==='all'?[...all]:all.filter(c=>c.tags&&c.tags.includes(activeFilter));
  render(shown);
}
function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('aiAnswer').style.display='none';
  document.getElementById('searchInput').value='';
  document.getElementById('quickTopics').style.display=f==='all'?'block':'none';
  applyFilter();
}
function qs(q){document.getElementById('searchInput').value=q;doSearch();}

async function callAI(system,userMsg,maxTokens){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,system,messages:[{role:'user',content:userMsg}]})
  });
  const d=await r.json();
  return d.content?.find(b=>b.type==='text')?.text||'';
}

async function doSearch(){
  const query=document.getElementById('searchInput').value.trim();
  if(!query)return;
  const kw=query.toLowerCase().split(/\s+/).filter(w=>w.length>2);
  shown=all.filter(c=>{
    const hay=[c.question,...(c.tags||[]),...(c.answers||[]).map(a=>a.text)].join(' ').toLowerCase();
    return kw.some(k=>hay.includes(k));
  });
  document.getElementById('quickTopics').style.display='none';
  render(shown);
  const btn=document.getElementById('searchBtn');
  const btnText=document.getElementById('btnText');
  const aiDiv=document.getElementById('aiAnswer');
  const aiText=document.getElementById('aiAnswerText');
  btn.disabled=true;
  btnText.innerHTML='<span class="loading-dots"><span></span><span></span><span></span></span>';
  aiDiv.style.display='block';
  aiText.innerHTML='<span class="loading-dots"><span></span><span></span><span></span></span> Synthesizing…';
  const ctx=all.map(c=>`Q: ${c.question}\nBy: ${c.asker} (${c.date})\nTags: ${(c.tags||[]).join(',')}\n${(c.answers||[]).map(a=>`Answer from ${a.author}: ${a.text}`).join('\n')}`).join('\n\n---\n\n');
  try{
    const answer=await callAI(
      `You are a practical healthcare case management assistant for SilverStay. Help care navigators find discharge solutions using the team's real Slack knowledge base. Be specific — reference facilities, contacts, dollar amounts when they appear. 3-6 sentences or a short bulleted list. Only use what's in the knowledge base or general CM expertise.`,
      `Knowledge base:\n\n${ctx}\n\n---\n\nQuestion: "${query}"\n\nPractical answer:`,800);
    aiText.textContent=answer;
    setTimeout(reportHeight,100);
  }catch{aiText.textContent='⚠️ AI unavailable — browse the cards below for relevant cases.';}
  btn.disabled=false;btnText.textContent='Ask AI';
}

document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

function setSyncing(v){
  document.getElementById('syncDot').className='dot'+(v?' spin':'');
  document.getElementById('syncBtn').className='sync-badge'+(v?' syncing':'');
  document.getElementById('syncLabel').textContent=v?'Syncing…':'Live';
}
function setLastSync(d){
  const el=document.getElementById('lastSyncLabel');
  if(el)el.textContent='Updated '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
function save(c){try{localStorage.setItem(CASES_KEY,JSON.stringify(c));}catch{}}
function load(){try{return JSON.parse(localStorage.getItem(CASES_KEY)||'null');}catch{return null;}}

async function syncNow(){
  if(isSyncing)return;
  isSyncing=true;setSyncing(true);
  try{
    const TRANSCRIPT=`tameka: 35 y/o female, homeless, extensive psych issues, $380/month income, refused shelter. Supportive housing options? [2026-03-12]\nTHREAD Tina: Any substance abuse issues or just psych?\nTHREAD tameka: Just psych no SUDS\nTHREAD Tina: Healthy Mind Maryland Transitional Housing 443-241-7940\nTHREAD Tina: Project Plase 410-837-1400\nTHREAD tameka: Issues with Project Plase. Will contact Health Minds.\n\nVijay: Contacts for FutureCare Pineview? [2026-03-11]\nTHREAD Tina: I can ask the FC liaison at NWH tomorrow\n\ntameka: Patient 462lbs. Anyone had success with placement at this weight? [2026-02-12]\nTHREAD Ashley: Can the patient stand and pivot?\nTHREAD Ashley: Only success when patient can stand. Either under 400 or have to be able to stand\nTHREAD Vijay: Likely ALF contract or work on weight reduction\n\nVijay: Hospital use overstay — patients 22 or under in hospital >48hrs — escalate DDA patients [2026-02-04]\n\nVijay: Complex MedStar TBI case — outside Neuropsych expert needed [2026-01-15]\nTHREAD Erin: Dr. Swanton at LifeBridge eswanton@lifebridgehealth.org\nTHREAD Ashley: TBI waiver folks at UMROI\n\nNicole: ALFs that can consider budget of $2k or less [2026-01-12]\n\nErin: 58yo woman paranoid schizophrenia, $1400/month, no payer, elopement risk, refuses meds, guardianship pending [2026-01-07]\n\nErin: Which LTC SNFs have trach beds? [2026-01-05]\n\nVijay: Place female patient, ambulatory, $1000/month, LTC leveled, Baltimore? [2026-01-02]\n\nErin: Bed-bound 78yo Burma, bilateral leg wounds, no insurance, 7 steps to apartment [2025-12-22]\n\nNicole: Contract case, not a citizen, uninsured, UMROI paying $3k/month ALF, brother has cancer can't bring to Georgia [2025-12-19]\nTHREAD Nicole/Vijay: Schedule meeting Jenna UMROI, onsite visit with interpreter\n\nErin: LTC facility for patient with poly SA history, stable on Methadone, Autumn Lake denial [2025-12-18]\n\nCristine: LTC admissions — POA required? Non-POA family? No POA pathways? [2025-12-05]\n\nAshley: Air ambo auth through BCBS? [2025-11-19]\n\nShiellina: Charitable DME company?\nTHREAD Erin: Partners in Care has walkers, closes at 5pm\n\nAshley: UM DTC patient transfer to University of Michigan, insurance cover transport? Out-of-state auth? [2025-11-14]\n\nVijay: Western Maryland Hospital from Traci — accepts uninsured/undocumented, SW Director Debbie Ferguson 301-745-4543 [2025-11-13]\n\nVijay: SNFs accepting oncology patients — more success via hospital system, transportation key factor [2025-11-13]\n\nErin: Skilled home health private pay? [2025-11-13]\n\nShiellina: New trach + PEG + HD patient Humana SCIR\nTHREAD Tameka: Complete Care Multi Med, LTACH, AL Post Acute, FC Homewood\n\nVijay: Gold standard LOC for borderline LTC? Barriers citizen no Medicare/Medicaid?\nTHREAD Tina: Submit LOC ALL NEEDS, include summary in comments, MA office screen for Medicare\n\nAshley: SNF Lorien, trach needs, CRE/CRO isolation\nTHREAD Tina: Lorien Bel Air Columbia Mt Airy accept trachs, need private room\n\nVijay: Patient $800 income, state guardianship, must be licensed ALF\nTHREAD Tameka: 3-month hospital contract to ALF until waiver\n\nErin: SNF bariatric under 500 lbs, criminal record, correctional facility, total care [2025-11-05]\n\nShiellina: Group homes for disabled patients?\n\nNicole: Contract patient re-hospitalized Good Sam, ALF won't accept back, behaviors, contract terminated [2026-03-27]\nTHREAD Tameka: Will connect with Mia at Good Sam`;

    const raw=await callAI(
      `Extract all substantive clinical case questions from this Slack transcript. Return ONLY a valid JSON array — no markdown, no explanation.\n\nSchema: [{id,question,asker,date,tags,icon,answers:[{author,text}]}]\n\nValid tags: snf,alf,ltc,housing,financial,behavioral,insurance,transport,trach,bariatric,dme,uninsured\n\nSkip join/leave events and social chatter.`,
      `Extract cases:\n\n${TRANSCRIPT}\n\nReturn ONLY the JSON array.`,8000);
    const cleaned=raw.replace(/```json\s*/gi,'').replace(/```\s*/gi,'').trim();
    const s=cleaned.indexOf('['),en=cleaned.lastIndexOf(']');
    if(s!==-1&&en!==-1){
      const parsed=JSON.parse(cleaned.slice(s,en+1));
      if(Array.isArray(parsed)&&parsed.length){
        all=parsed;save(all);
        const now=new Date();localStorage.setItem(TS_KEY,now.toISOString());setLastSync(now);
      }
    }
  }catch(err){console.warn('sync failed',err);}
  document.getElementById('loadingSkel').style.display='none';
  applyFilter();setSyncing(false);isSyncing=false;
}

(()=>{
  const cached=load();
  if(cached&&cached.length){
    all=cached;shown=[...all];
    document.getElementById('loadingSkel').style.display='none';
    render(shown);
    const t=localStorage.getItem(TS_KEY);
    if(t)setLastSync(new Date(t));
  } else {
    all=[...SEED];
  }
  syncNow();
})();
